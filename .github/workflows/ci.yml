name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        codec: [VarByte, Raw32]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-13

      - name: Configure
        env:
          CXX: g++-13
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DIDX_CODEC=${{ matrix.codec }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
